<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #1e2124; --bg-card: #2f3136; --text-main: #ffffff;
            --text-dim: #b9bbbe; --accent: #43b581; --danger: #f04747; --border: #40444b;
        }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Kanit', sans-serif; margin: 0; padding-bottom: 90px; }
        .container { padding: 20px; max-width: 450px; margin: auto; }
        .page { display: none; animation: fadeIn 0.2s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        h2 { border-left: 4px solid var(--accent); padding-left: 10px; margin-bottom: 20px; font-size: 1.4rem; }
        .card { background: var(--bg-card); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        label { display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 0.9rem; }
        select, input { width: 100%; padding: 12px; margin-bottom: 12px; background: #36393f; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .match-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; }
        .vs-text { color: var(--danger); font-weight: bold; font-size: 1.2rem; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-choice { flex: 1; padding: 12px; background: #36393f; border: 1px solid var(--border); color: white; border-radius: 8px; cursor: pointer; }
        .btn-choice.selected { border-color: var(--accent); background: rgba(67, 181, 129, 0.1); color: var(--accent); }
        .btn-main { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .btn-main:disabled { background: #555; cursor: not-allowed; opacity: 0.7; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--text-dim); border-bottom: 1px solid var(--border); padding: 10px; font-size: 0.8rem; }
        td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 0.9rem; vertical-align: top; }
        .sub-text { font-size: 0.75rem; color: var(--text-dim); display: block; margin-top: 2px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #202225; display: flex; border-top: 1px solid var(--border); padding: 10px 0; }
        .nav-item { flex: 1; text-align: center; color: var(--text-dim); cursor: pointer; font-size: 0.8rem; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        .status-pill { padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; background: #444; color: var(--text-dim); }
        .status-pill.active { background: rgba(67, 181, 129, 0.2); color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div id="page1" class="page active">
        <h2>👥 ลงทะเบียนเข้าก๊วน</h2>
        <div class="card">
            <input type="text" id="mem_name" placeholder="ชื่อเล่น/ชื่อที่ใช้เรียก">
            <select id="mem_class">
                <option value="BB">BB</option><option value="BB+">BB+</option>
                <option value="BG">BG</option><option value="BG+">BG+</option>
                <option value="N">N</option><option value="N+">N+</option>
                <option value="S">S</option><option value="S+">S+</option>
                <option value="P">P</option>
            </select>
            <input type="text" id="mem_note" placeholder="หมายเหตุ (เช่น เบอร์โทร, สังกัด)">
            <button class="btn-main" id="btn_reg" onclick="registerMember()">+ เพิ่มเข้าก๊วน</button>
        </div>
        
        <div class="card" style="padding: 10px;">
            <h3 style="font-size: 1rem; padding: 10px 10px 0 10px; color: var(--text-dim);">รายชื่อสมาชิกล่าสุด</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ชื่อ/โน้ต</th>
                            <th>ระดับ</th>
                            <th>สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="memberListBody">
                        <tr><td colspan="3" style="text-align:center;">กำลังโหลดรายชื่อ...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="page2" class="page">
        <h2>🏸 บันทึกผล</h2>
        <div class="card">
            <div class="match-grid">
                <div><select id="p1a" class="player-list"></select><select id="p2a" class="player-list"></select></div>
                <div class="vs-text">VS</div>
                <div><select id="p1b" class="player-list"></select><select id="p2b" class="player-list"></select></div>
            </div>
            <div class="btn-group">
                <button class="btn-choice" id="winA" onclick="setWin('Team A')">ทีม A ชนะ</button>
                <button class="btn-choice" id="winB" onclick="setWin('Team B')">ทีม B ชนะ</button>
            </div>
            <button class="btn-main" id="btn_save" onclick="saveMatch()">บันทึกข้อมูล</button>
        </div>
    </div>

    <div id="page3" class="page">
        <h2>📊 สถิติรวม</h2>
        <div class="card table-wrapper">
            <table><thead><tr><th>สมาชิก</th><th>ชนะ/เล่น</th><th>คู่/แข่ง</th></tr></thead><tbody id="statsBody"></tbody></table>
        </div>
    </div>

    <div id="page4" class="page">
        <h2>🚪 กลับบ้าน</h2>
        <div class="card">
            <select id="out_name" class="player-list"></select>
            <button class="btn-main" id="btn_out" style="background: var(--danger);" onclick="checkOut()">บันทึกการกลับ</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showPage(1); loadMemberList();">ลงชื่อ</div>
    <div class="nav-item" onclick="showPage(2); fetchDropdowns();">จดผล</div>
    <div class="nav-item" onclick="showPage(3); loadStats();">สถิติ</div>
    <div class="nav-item" onclick="showPage(4); fetchDropdowns();">กลับบ้าน</div>
</nav>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw4n-aOBtFaokAdC-zhGYc7j1O4GiB5F1sjT1df3uVnKdU5vIRFBEQWcJJEUuf1CRztmA/exec";
    let selectedWinner = "";

    window.onload = loadMemberList;

    function showPage(num) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page' + num).classList.add('active');
        document.querySelectorAll('.nav-item')[num-1].classList.add('active');
    }

    function setWin(team) {
        selectedWinner = team;
        document.getElementById('winA').className = team === 'Team A' ? 'btn-choice selected' : 'btn-choice';
        document.getElementById('winB').className = team === 'Team B' ? 'btn-choice selected' : 'btn-choice';
    }

    async function sendData(payload, btnId) {
        const btn = document.getElementById(btnId);
        const originalText = btn.innerText;
        btn.disabled = true; btn.innerText = "กำลังบันทึก...";
        try {
            await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert("บันทึกสำเร็จ!");
            if(btnId === 'btn_reg') loadMemberList();
        } catch (e) { alert("เกิดข้อผิดพลาด"); }
        btn.disabled = false; btn.innerText = originalText;
    }

    async function loadMemberList() {
        const body = document.getElementById('memberListBody');
        try {
            const res = await fetch(WEB_APP_URL);
            let data = await res.json();
            data.reverse();
            let html = "";
            data.forEach(m => {
                const statusClass = m.Status === "Active" ? "active" : "";
                html += `<tr>
                    <td><b>${m.Name}</b><span class="sub-text">${m.Note || ''}</span></td>
                    <td>${m.Class || '-'}</td>
                    <td><span class="status-pill ${statusClass}">${m.Status}</span></td>
                </tr>`;
            });
            body.innerHTML = html || "<tr><td colspan="3">ยังไม่มีรายชื่อ</td></tr>";
        } catch (e) { body.innerHTML = "<tr><td colspan="3">โหลดข้อมูลไม่สำเร็จ</td></tr>"; }
    }

    async function registerMember() {
        const name = document.getElementById('mem_name').value;
        const note = document.getElementById('mem_note').value;
        if (!name) return alert("ใส่ชื่อด้วยครับ");
        await sendData({ type: "new_member", name: name, class: document.getElementById('mem_class').value, note: note }, "btn_reg");
        document.getElementById('mem_name').value = "";
        document.getElementById('mem_note').value = "";
    }

    async function saveMatch() {
        const data = { teamA_p1: document.getElementById('p1a').value, teamA_p2: document.getElementById('p2a').value, teamB_p1: document.getElementById('p1b').value, teamB_p2: document.getElementById('p2b').value, winner: selectedWinner };
        if (!data.winner || !data.teamA_p1 || !data.teamB_p1) return alert("ข้อมูลไม่ครบ");
        await sendData(data, "btn_save");
    }

    async function fetchDropdowns() {
        const res = await fetch(WEB_APP_URL);
        const data = await res.json();
        document.querySelectorAll('.player-list').forEach(s => {
            s.innerHTML = '<option value="">- เลือกชื่อ -</option>';
            data.forEach(m => { if(m.Status === "Active") s.innerHTML += `<option value="${m.Name}">${m.Name}</option>`; });
        });
    }

    async function loadStats() {
        const body = document.getElementById('statsBody');
        body.innerHTML = "<tr><td colspan="3">กำลังโหลด...</td></tr>";
        const res = await fetch(WEB_APP_URL);
        let data = await res.json();
        data.reverse();
        let html = "";
        data.forEach(m => {
            html += `<tr><td><b>${m.Name}</b><span class="sub-text">${m.Class} | ${(m.WinRate*100).toFixed(0)}%</span></td><td>${m.Win}/${m.TotalPlayed}</td><td><span class="sub-text">🤝 ${m.AllPartners || '-'}</span><span class="sub-text">⚔️ ${m.AllOpponents || '-'}</span></td></tr>`;
        });
        body.innerHTML = html;
    }
</script>
</body>
</html>
