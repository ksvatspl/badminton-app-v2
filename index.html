<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Hub Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #1e2124; --bg-card: #2f3136; --text-main: #ffffff;
            --text-dim: #b9bbbe; --accent: #43b581; --danger: #f04747; --border: #40444b; --warning: #faa61a;
            /* Class Colors */
            --cls-p: #ff66b2; --cls-s: #ff4d4d; --cls-n: #ffaa00; --cls-bg: #33ccff; --cls-bb: #44ffaa;
        }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Kanit', sans-serif; margin: 0; padding-bottom: 90px; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .page { display: none; animation: fadeIn 0.2s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        h2 { border-left: 4px solid var(--accent); padding-left: 10px; margin-bottom: 20px; font-size: 1.3rem; display: flex; justify-content: space-between; align-items: center; }
        .card { background: var(--bg-card); border-radius: 15px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: relative; }
        .game-label { position: absolute; top: -10px; right: 20px; background: var(--accent); color: white; padding: 2px 12px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; }
        
        /* Class Colors */
        .txt-p { color: var(--cls-p) !important; font-weight: bold; }
        .txt-s { color: var(--cls-s) !important; font-weight: bold; }
        .txt-n { color: var(--cls-n) !important; font-weight: bold; }
        .txt-bg { color: var(--cls-bg) !important; font-weight: bold; }
        .txt-bb { color: var(--cls-bb) !important; font-weight: bold; }

        select, input { width: 100%; padding: 12px; margin-bottom: 12px; background: #36393f; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .p-select { margin-bottom: 10px; border-left: 5px solid transparent; }

        .match-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 15px; }
        .vs-text { color: var(--danger); font-weight: bold; font-size: 1.1rem; text-align: center; }
        
        .btn-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-choice { flex: 1; padding: 10px; background: #36393f; border: 1px solid var(--border); color: white; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
        .btn-choice.selected { border-color: var(--accent); background: rgba(67, 181, 129, 0.1); color: var(--accent); }
        
        .btn-main { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-main.saved { background: #4f545c; }
        
        /* Stats Table */
        .stats-table-container { background: var(--bg-card); border-radius: 12px; overflow-x: auto; }
        .stats-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 420px; }
        .stats-table th { background: #36393f; padding: 12px 6px; text-align: center; color: var(--text-dim); border-bottom: 2px solid var(--border); }
        .stats-table th:first-child { text-align: left; padding-left: 10px; }
        .stats-table td { padding: 12px 6px; border-bottom: 1px solid var(--border); text-align: center; vertical-align: middle; }
        .stats-table td:first-child { text-align: left; padding-left: 10px; }
        .win-text { color: var(--accent); font-weight: bold; }
        .loss-text { color: var(--danger); font-weight: bold; }
        .wr-badge { background: rgba(67, 181, 129, 0.2); color: var(--accent); padding: 2px 6px; border-radius: 4px; font-weight: bold; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #202225; display: flex; border-top: 1px solid var(--border); padding: 10px 0; z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: var(--text-dim); cursor: pointer; font-size: 0.85rem; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); }
        .modal-content { background: var(--bg-card); margin: 15% auto; padding: 20px; border-radius: 15px; width: 85%; max-width: 400px; }
    </style>
</head>
<body>

<div id="statsModal" class="modal">
    <div class="modal-content">
        <span onclick="closeStats()" style="float:right; cursor:pointer; font-size:24px;">&times;</span>
        <h3 style="margin-top:0; color:var(--accent);">📊 สถิติย่อ</h3>
        <div id="miniStatsList"></div>
    </div>
</div>

<div class="container">
    <div id="page1" class="page active">
        <h2>👥 ลงทะเบียนเข้าก๊วน</h2>
        <div class="card">
            <input type="text" id="mem_name" placeholder="ชื่อเล่น">
            <select id="mem_class" onchange="applyColor(this)">
                <option value="BB">BB</option><option value="BB+">BB+</option>
                <option value="BG">BG</option><option value="BG+">BG+</option>
                <option value="N">N</option><option value="N+">N+</option>
                <option value="S">S</option><option value="S+">S+</option>
                <option value="P">P</option>
            </select>
            <input type="text" id="mem_note" placeholder="หมายเหตุ (ถ้ามี)">
            <button class="btn-main" onclick="registerMember()">+ เพิ่มเข้าก๊วน</button>
        </div>
        <div class="card" style="padding: 5px;">
            <table style="width:100%; border-collapse:collapse;" id="memberListBody"></table>
        </div>
    </div>

    <div id="page2" class="page">
        <h2>🏸 จดผลการแข่ง <button class="btn-choice" style="width:auto; padding:5px 10px;" onclick="openStats()">📊 ย่อ</button></h2>
        <div id="matchContainer"></div>
        <button class="btn-main" style="background:transparent; border:2px dashed var(--border); color:var(--text-dim);" onclick="addNewMatchBox(true)">+ เพิ่มเกมถัดไป</button>
    </div>

    <div id="page3" class="page">
        <h2>🚪 จัดการสถานะ</h2>
        <div class="card">
            <select id="status_name" onchange="applyColor(this)"></select>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" style="background: var(--danger); flex: 1;" onclick="updateStatus('checkout')">🔴 กลับบ้าน</button>
                <button class="btn-main" style="background: var(--warning); color: #000; flex: 1;" onclick="updateStatus('undo')">🟢 เล่นต่อ</button>
            </div>
        </div>
        <h2>📊 สถิติรวม (เรียงตามจำนวนเกม)</h2>
        <div id="fullStatsList"></div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showPage(1); loadMemberList();">ลงชื่อ</div>
    <div class="nav-item" onclick="showPage(2); initMatchPage();">จดผล</div>
    <div class="nav-item" onclick="showPage(3); loadStatsAndDropdown();">สถิติ</div>
</nav>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyZJ_p8IYOsWlGQl8gVtIsKr81--2OO0g9h1oMr2_2sYwlYe6xxeyTUa8xq2glAReIDFg/exec";
    let gameCount = 0;
    let allDataMemory = []; 

    function showPage(num) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page' + num).classList.add('active');
        document.querySelectorAll('.nav-item')[num-1].classList.add('active');
    }

    function getTxtClass(cls) {
        if(!cls) return "";
        if(cls.includes('P')) return "txt-p";
        if(cls.includes('S')) return "txt-s";
        if(cls.includes('N')) return "txt-n";
        if(cls.includes('BG')) return "txt-bg";
        return "txt-bb";
    }

    function applyColor(el) {
        el.className = "";
        if(el.id === "status_name") el.classList.add('player-list');
        const val = el.options[el.selectedIndex].text;
        const clsMatch = val.match(/\[(.*?)\]/);
        const cls = clsMatch ? clsMatch[1] : el.value;
        el.classList.add(getTxtClass(cls));
        if(el.tagName === "SELECT" && el.classList.contains('p-select')) {
            const colorCode = getComputedStyle(document.documentElement).getPropertyValue('--cls-' + getTxtClass(cls).split('-')[1]);
            el.style.borderLeftColor = colorCode;
        }
    }

    // --- MATCH LOGIC ---
    async function initMatchPage() {
        const res = await fetch(WEB_APP_URL);
        allDataMemory = await res.json();
        if(gameCount === 0) addNewMatchBox();
    }

    function addNewMatchBox(shouldScroll = false) {
        gameCount++;
        const container = document.getElementById('matchContainer');
        const box = document.createElement('div');
        box.className = 'card';
        box.id = `match-box-${gameCount}`;
        box.innerHTML = `
            <div class="game-label">เกมที่ ${gameCount}</div>
            <div class="match-grid">
                <div>
                    <select class="p-select" onchange="applyColor(this)" data-role="p1a">${getMemberOptions()}</select>
                    <select class="p-select" onchange="applyColor(this)" data-role="p2a">${getMemberOptions()}</select>
                </div>
                <div class="vs-text">VS</div>
                <div>
                    <select class="p-select" onchange="applyColor(this)" data-role="p1b">${getMemberOptions()}</select>
                    <select class="p-select" onchange="applyColor(this)" data-role="p2b">${getMemberOptions()}</select>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn-choice" onclick="setBoxWin(this, 'Team A')">ทีม A ชนะ</button>
                <button class="btn-choice" onclick="setBoxWin(this, 'Team B')">ทีม B ชนะ</button>
            </div>
            <button class="btn-main" onclick="saveMatchBox(${gameCount})">บันทึก</button>
        `;
        container.appendChild(box);
        if(shouldScroll) window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function getMemberOptions() {
        let options = '<option value="">- เลือก -</option>';
        allDataMemory.filter(m => m.Status === "Active").forEach(m => {
            options += `<option value="${m.Name}">${m.Name} — [${m.Class}]</option>`;
        });
        return options;
    }

    function setBoxWin(btn, team) {
        const parent = btn.parentElement;
        parent.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        parent.dataset.winner = team;
    }

    async function saveMatchBox(id) {
        const box = document.getElementById(`match-box-${id}`);
        const winner = box.querySelector('.btn-group').dataset.winner;
        if (!winner || !box.querySelector('[data-role="p1a"]').value) return alert("ข้อมูลไม่ครบ!");
        const btnSave = box.querySelector('.btn-main');
        btnSave.disabled = true; btnSave.innerText = "บันทึก...";
        const data = { 
            teamA_p1: box.querySelector('[data-role="p1a"]').value, teamA_p2: box.querySelector('[data-role="p2a"]').value, 
            teamB_p1: box.querySelector('[data-role="p1b"]').value, teamB_p2: box.querySelector('[data-role="p2b"]').value, 
            winner: winner 
        };
        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        btnSave.innerText = "สำเร็จ ✓"; btnSave.classList.add('saved');
        const res = await fetch(WEB_APP_URL);
        allDataMemory = await res.json();
    }

    // --- STATS & STATUS ---
    async function loadStatsAndDropdown() {
        const container = document.getElementById('fullStatsList');
        container.innerHTML = "กำลังโหลด...";
        const res = await fetch(WEB_APP_URL);
        allDataMemory = await res.json();
        
        // Dropdown
        const select = document.getElementById('status_name');
        select.innerHTML = '<option value="">- เลือกชื่อผู้เล่น -</option>';
        allDataMemory.forEach(m => {
            if(m.Name) select.innerHTML += `<option value="${m.Name}">${m.Name} — [${m.Class}] (${m.Status})</option>`;
        });

        // Table
        let sorted = [...allDataMemory].sort((a, b) => (b.TotalPlayed || 0) - (a.TotalPlayed || 0));
        let html = `<div class="stats-table-container"><table class="stats-table">
            <thead><tr><th>ชื่อ</th><th>ระดับ</th><th>สถานะ</th><th>เล่น</th><th>ช/พ</th><th>% ชนะ</th></tr></thead><tbody>`;
        sorted.forEach(m => {
            if(!m.Name) return;
            const statusStyle = m.Status === 'Active' ? 'color:var(--accent)' : 'color:var(--danger)';
            html += `<tr>
                <td><b>${m.Name}</b></td>
                <td class="${getTxtClass(m.Class)}">${m.Class}</td>
                <td style="${statusStyle}; font-size:0.75rem;">${m.Status === 'Active' ? 'Active' : 'กลับแล้ว'}</td>
                <td style="font-weight:bold;">${m.TotalPlayed}</td>
                <td><span class="win-text">${m.Win}</span>/<span class="loss-text">${m.Loss}</span></td>
                <td><span class="wr-badge">${(m.WinRate * 100 || 0).toFixed(0)}%</span></td>
            </tr>`;
        });
        html += `</tbody></table></div>`;
        container.innerHTML = html;
    }

    async function updateStatus(action) {
        const name = document.getElementById('status_name').value;
        if (!name) return alert("เลือกชื่อก่อนครับ");
        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: action, name: name }) });
        alert("บันทึกเรียบร้อย!");
        setTimeout(loadStatsAndDropdown, 1000);
    }

    async function loadMemberList() {
        const res = await fetch(WEB_APP_URL);
        allDataMemory = await res.json();
        let html = "";
        allDataMemory.slice().reverse().forEach(m => {
            if(!m.Name) return;
            html += `<tr style="border-bottom:1px solid var(--border);">
                <td style="padding:10px;"><b>${m.Name}</b><br><small style="color:var(--text-dim)">${m.Note || ''}</small></td>
                <td class="${getTxtClass(m.Class)}" style="text-align:center;">${m.Class}</td>
                <td style="text-align:right; font-size:0.8rem; color:${m.Status === 'Active' ? 'var(--accent)' : 'var(--danger)'}">${m.Status}</td>
            </tr>`;
        });
        document.getElementById('memberListBody').innerHTML = html;
    }

    async function registerMember() {
        const name = document.getElementById('mem_name').value;
        if(!name) return alert("ใส่ชื่อด้วยครับ");
        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: "new_member", name: name, class: document.getElementById('mem_class').value, note: document.getElementById('mem_note').value }) });
        alert("สำเร็จ!"); location.reload();
    }

    function openStats() { document.getElementById('statsModal').style.display = "block"; renderMiniStats(); }
    function closeStats() { document.getElementById('statsModal').style.display = "none"; }
    function renderMiniStats() {
        let sorted = [...allDataMemory].sort((a, b) => (b.TotalPlayed || 0) - (a.TotalPlayed || 0));
        let html = "";
        sorted.forEach(m => { if(m.Name) html += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border);"><span>${m.Name}</span><span class="${getTxtClass(m.Class)}">${m.Class}</span><span><b>${m.TotalPlayed}</b> เกม</span></div>`; });
        document.getElementById('miniStatsList').innerHTML = html;
    }

    window.onload = loadMemberList;
</script>
</body>
</html>
