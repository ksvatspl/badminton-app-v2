<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Hub Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #1e2124; --bg-card: #2f3136; --text-main: #ffffff;
            --text-dim: #b9bbbe; --accent: #43b581; --danger: #f04747; --border: #40444b; --warning: #faa61a;
            /* Class Colors */
            --cls-p: #ff66b2; --cls-s: #ff4d4d; --cls-n: #ffaa00; --cls-bg: #33ccff; --cls-bb: #44ffaa;
        }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Kanit', sans-serif; margin: 0; padding-bottom: 90px; }
        .container { padding: 20px; max-width: 450px; margin: auto; }
        .page { display: none; animation: fadeIn 0.2s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        h2 { border-left: 4px solid var(--accent); padding-left: 10px; margin-bottom: 20px; font-size: 1.4rem; display: flex; justify-content: space-between; align-items: center; }
        .card { background: var(--bg-card); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: relative; }
        .game-label { position: absolute; top: -10px; right: 20px; background: var(--accent); color: white; padding: 2px 12px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; }
        
        /* Class Font Colors */
        .txt-p { color: var(--cls-p) !important; font-weight: bold; }
        .txt-s { color: var(--cls-s) !important; font-weight: bold; }
        .txt-n { color: var(--cls-n) !important; font-weight: bold; }
        .txt-bg { color: var(--cls-bg) !important; font-weight: bold; }
        .txt-bb { color: var(--cls-bb) !important; font-weight: bold; }

        select, input { width: 100%; padding: 12px; margin-bottom: 8px; background: #36393f; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        select:focus { border-color: var(--accent); outline: none; }
        
        /* สไตล์พิเศษสำหรับ Dropdown ที่เลือกแล้ว */
        .p-select { margin-bottom: 12px; border-left: 5px solid transparent; }

        .match-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; margin-bottom: 15px; }
        .vs-text { color: var(--danger); font-weight: bold; font-size: 1.2rem; text-align: center; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-choice { flex: 1; padding: 12px; background: #36393f; border: 1px solid var(--border); color: white; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        .btn-choice.selected { border-color: var(--accent); background: rgba(67, 181, 129, 0.1); color: var(--accent); }
        
        .btn-main { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .btn-main.saved { background: #4f545c; }
        
        /* Modal สถิติย่อ */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); }
        .modal-content { background: var(--bg-card); margin: 10% auto; padding: 20px; border-radius: 15px; width: 90%; max-width: 420px; max-height: 80vh; overflow-y: auto; }
        .stat-row { display: grid; grid-template-columns: 2fr 0.8fr 1.5fr; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .stat-total { font-size: 1.2rem; font-weight: 600; color: #fff; text-align: center; }
        .btn-peek { background: #5865f2; color: white; border: none; border-radius: 8px; padding: 8px 15px; font-size: 0.85rem; cursor: pointer; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #202225; display: flex; border-top: 1px solid var(--border); padding: 10px 0; z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: var(--text-dim); cursor: pointer; font-size: 0.8rem; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div id="statsModal" class="modal">
    <div class="modal-content">
        <span onclick="closeStats()" style="float:right; cursor:pointer; font-size:24px;">&times;</span>
        <h3 style="margin-top:0; color:var(--accent);">📊 สถิติ (เรียงตามเกมเล่นมากที่สุด)</h3>
        <div id="miniStatsList"></div>
    </div>
</div>

<div class="container">
    <div id="page1" class="page active">
        <h2>👥 ลงทะเบียนเข้าก๊วน</h2>
        <div class="card">
            <input type="text" id="mem_name" placeholder="ชื่อเล่น">
            <select id="mem_class" onchange="applyColor(this)">
                <option value="BB">BB</option><option value="BB+">BB+</option>
                <option value="BG">BG</option><option value="BG+">BG+</option>
                <option value="N">N</option><option value="N+">N+</option>
                <option value="S">S</option><option value="S+">S+</option>
                <option value="P">P</option>
            </select>
            <input type="text" id="mem_note" placeholder="หมายเหตุ">
            <button class="btn-main" onclick="registerMember()">+ เพิ่มเข้าก๊วน</button>
        </div>
        <div class="card" style="padding: 10px;">
            <table style="width:100%; border-collapse:collapse;" id="memberListBody"></table>
        </div>
    </div>

    <div id="page2" class="page">
        <h2>🏸 จดผลการแข่ง <button class="btn-peek" onclick="openStats()">📊 สถิติย่อ</button></h2>
        <div id="matchContainer"></div>
        <button class="btn-main" style="background:transparent; border:2px dashed var(--border); color:var(--text-dim);" onclick="addNewMatchBox(true)">+ เพิ่มเกมถัดไป</button>
    </div>

    <div id="page3" class="page"><h2>📊 สถิติรวม</h2><div id="fullStatsList"></div></div>
    <div id="page4" class="page">
        <h2>🚪 เช็กเอาท์</h2>
        <div class="card"><select id="out_name" class="player-list" onchange="applyColor(this)"></select><button class="btn-main" style="background: var(--danger);" onclick="checkOut()">บันทึกการกลับ</button></div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showPage(1); loadMemberList();">ลงชื่อ</div>
    <div class="nav-item" onclick="showPage(2); initMatchPage();">จดผล</div>
    <div class="nav-item" onclick="showPage(3); loadStats();">สถิติ</div>
    <div class="nav-item" onclick="showPage(4); fetchDropdowns();">กลับบ้าน</div>
</nav>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwbD1kRA5jDrJJNr5nnqHIRcZzk9IjmHAXi9LqCl5urGyxM7HgxbviOYuUbnV9f-YEawA/exec";
    let gameCount = 0;
    let allDataMemory = []; 

    window.onload = loadMemberList;

    function showPage(num) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page' + num).classList.add('active');
        document.querySelectorAll('.nav-item')[num-1].classList.add('active');
        if(num === 2) setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 150);
    }

    // ฟังก์ชันช่วยจัดการสีฟอนต์ตามระดับ
    function getTxtClass(cls) {
        if(!cls) return "";
        if(cls.includes('P')) return "txt-p";
        if(cls.includes('S')) return "txt-s";
        if(cls.includes('N')) return "txt-n";
        if(cls.includes('BG')) return "txt-bg";
        return "txt-bb";
    }

    // ฟังก์ชันเปลี่ยนสี Dropdown เมื่อเลือก
    function applyColor(el) {
        el.className = ""; // clear
        const val = el.options[el.selectedIndex].text;
        const clsMatch = val.match(/\[(.*?)\]/);
        const cls = clsMatch ? clsMatch[1] : el.value;
        el.classList.add(getTxtClass(cls));
        
        // สำหรับหน้าจดผล เพิ่มเส้นสีด้านซ้าย
        if(el.classList.contains('p-select')) {
            const colorCode = getComputedStyle(document.documentElement).getPropertyValue('--cls-' + getTxtClass(cls).split('-')[1]);
            el.style.borderLeftColor = colorCode;
        }
    }

    // --- MINI STATS ---
    function openStats() { document.getElementById('statsModal').style.display = "block"; renderMiniStats(); }
    function closeStats() { document.getElementById('statsModal').style.display = "none"; }

    function renderMiniStats() {
        const list = document.getElementById('miniStatsList');
        let sorted = [...allDataMemory].sort((a, b) => (b.TotalPlayed || 0) - (a.TotalPlayed || 0));
        let html = "";
        sorted.forEach(m => {
            if(!m.Name) return;
            html += `<div class="stat-row">
                <div style="font-weight:500;">${m.Name}</div>
                <div class="${getTxtClass(m.Class)}" style="text-align:center;">${m.Class}</div>
                <div style="text-align:right;"><span class="stat-total">${m.TotalPlayed}</span> <small style="color:var(--text-dim)">[${m.Win}/${m.Loss}]</small></div>
            </div>`;
        });
        list.innerHTML = html;
    }

    // --- MATCH LOGIC ---
    async function initMatchPage() {
        const res = await fetch(WEB_APP_URL);
        allDataMemory = await res.json();
        if(gameCount === 0) addNewMatchBox();
    }

    function addNewMatchBox(shouldScroll = false) {
        gameCount++;
        const container = document.getElementById('matchContainer');
        const box = document.createElement('div');
        box.className = 'card';
        box.id = `match-box-${gameCount}`;
        box.innerHTML = `
            <div class="game-label">เกมที่ ${gameCount}</div>
            <div class="match-grid">
                <div>
                    <select class="p-select" onchange="applyColor(this)" data-role="p1a">${getMemberOptions()}</select>
                    <select class="p-select" onchange="applyColor(this)" data-role="p2a">${getMemberOptions()}</select>
                </div>
                <div class="vs-text">VS</div>
                <div>
                    <select class="p-select" onchange="applyColor(this)" data-role="p1b">${getMemberOptions()}</select>
                    <select class="p-select" onchange="applyColor(this)" data-role="p2b">${getMemberOptions()}</select>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn-choice" onclick="setBoxWin(this, 'Team A')">ทีม A ชนะ</button>
                <button class="btn-choice" onclick="setBoxWin(this, 'Team B')">ทีม B ชนะ</button>
            </div>
            <button class="btn-main" onclick="saveMatchBox(${gameCount})">บันทึกข้อมูล</button>
            <button class="btn-main" style="background:var(--warning); margin-top:10px; font-size:0.8rem; display:none;" onclick="editMatchBox(${gameCount})">✎ แก้ไข</button>
        `;
        container.appendChild(box);
        if(shouldScroll) setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 150);
    }

    function getMemberOptions() {
        let options = '<option value="">- เลือกผู้เล่น -</option>';
        allDataMemory.filter(m => m.Status === "Active").forEach(m => {
            // ใช้ Space และขีดกลางเพื่อแยกชื่อกับระดับให้ชัดเจนที่สุด
            const padding = " — "; 
            options += `<option value="${m.Name}">${m.Name}${padding}[${m.Class}]</option>`;
        });
        return options;
    }

    function setBoxWin(btn, team) {
        const parent = btn.parentElement;
        parent.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        parent.dataset.winner = team;
    }

    async function saveMatchBox(id) {
        const box = document.getElementById(`match-box-${id}`);
        const winner = box.querySelector('.btn-group').dataset.winner;
        if (!winner || !box.querySelector('[data-role="p1a"]').value) return alert("ข้อมูลไม่ครบ!");
        const btnSave = box.querySelector('.btn-main');
        btnSave.disabled = true; btnSave.innerText = "กำลังบันทึก...";
        const data = { 
            teamA_p1: box.querySelector('[data-role="p1a"]').value, 
            teamA_p2: box.querySelector('[data-role="p2a"]').value, 
            teamB_p1: box.querySelector('[data-role="p1b"]').value, 
            teamB_p2: box.querySelector('[data-role="p2b"]').value, 
            winner: winner 
        };
        try {
            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            btnSave.innerText = "บันทึกแล้ว ✓"; btnSave.classList.add('saved');
            box.querySelector('button[onclick*="edit"]').style.display = 'block';
            box.querySelectorAll('select, .btn-choice').forEach(el => el.disabled = true);
            const res = await fetch(WEB_APP_URL);
            allDataMemory = await res.json();
        } catch (e) { alert("Error!"); btnSave.disabled = false; }
    }

    function editMatchBox(id) {
        const box = document.getElementById(`match-box-${id}`);
        const btnSave = box.querySelector('.btn-main');
        btnSave.classList.remove('saved'); btnSave.innerText = "บันทึกข้อมูล"; btnSave.disabled = false;
        box.querySelector('button[onclick*="edit"]').style.display = 'none';
        box.querySelectorAll('select, .btn-choice').forEach(el => el.disabled = false);
    }

    async function loadMemberList() {
        const body = document.getElementById('memberListBody');
        const res = await fetch(WEB_APP_URL);
        allDataMemory = await res.json();
        let html = "";
        allDataMemory.slice().reverse().forEach(m => {
            if(!m.Name) return;
            html += `<tr style="border-bottom:1px solid var(--border);">
                <td style="padding:12px 5px;"><b>${m.Name}</b><br><small style="color:var(--text-dim)">${m.Note || ''}</small></td>
                <td style="text-align:center;" class="${getTxtClass(m.Class)}">${m.Class}</td>
                <td style="text-align:right;"><small style="color:${m.Status === 'Active' ? 'var(--accent)' : 'var(--text-dim)'}">${m.Status}</small></td>
            </tr>`;
        });
        body.innerHTML = html;
    }

    async function registerMember() {
        const name = document.getElementById('mem_name').value;
        if(!name) return alert("กรุณาใส่ชื่อ");
        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: "new_member", name: name, class: document.getElementById('mem_class').value, note: document.getElementById('mem_note').value }) });
        alert("สำเร็จ!"); location.reload(); 
    }

    async function loadStats() {
        const container = document.getElementById('fullStatsList');
        container.innerHTML = "กำลังโหลด...";
        const res = await fetch(WEB_APP_URL);
        allDataMemory = await res.json();
        let html = "";
        allDataMemory.forEach(m => {
            if(!m.Name) return;
            html += `<div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span><b>${m.Name}</b> <span class="${getTxtClass(m.Class)}">[${m.Class}]</span></span>
                    <span style="color:var(--accent); font-weight:bold;">${(m.WinRate*100 || 0).toFixed(0)}%</span>
                </div>
                <div class="sub-text" style="margin-top:10px; color:#fff; font-size:0.9rem;">เล่น ${m.TotalPlayed} | ชนะ ${m.Win} | แพ้ ${m.Loss}</div>
            </div>`;
        });
        container.innerHTML = html;
    }

    async function fetchDropdowns() {
        const res = await fetch(WEB_APP_URL);
        allDataMemory = await res.json();
        const select = document.getElementById('out_name');
        select.innerHTML = '<option value="">- เลือกชื่อ -</option>';
        allDataMemory.filter(m => m.Status === "Active").forEach(m => {
            select.innerHTML += `<option value="${m.Name}">${m.Name} — [${m.Class}]</option>`;
        });
    }
</script>
</body>
</html>
